apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wh-dra-kubelet-plugin
  namespace: kube-system
  labels:
    {{- include "wh-dra-plugin.labels" . | nindent 4 }}
    app: wh-dra-kubelet-plugin
spec:
  selector:
    matchLabels:
      app: wh-dra-kubelet-plugin
  template:
    metadata:
      labels:
        app: wh-dra-kubelet-plugin
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      serviceAccountName: wh-dra-plugin
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: wh-dra-kubelet-plugin
        image: {{ include "wh-dra-plugin.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/usr/local/bin/wh-dra-kubelet-plugin"]
        args:
        - --node-name=$(NODE_NAME)
        - --cdi-dir={{ .Values.plugin.cdiDir }}
        - --checkpoint-dir={{ .Values.plugin.checkpointDir }}
        - --metrics-port={{ .Values.plugin.metricsPort }}
        - --tt-smi-path={{ .Values.plugin.ttSmiPath }}
        - --health-check-interval={{ .Values.plugin.healthCheckInterval }}
        {{- if .Values.plugin.fmAddr }}
        - --fm-addr={{ .Values.plugin.fmAddr }}
        {{- end }}
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
        volumeMounts:
        - name: plugin-dir
          mountPath: {{ .Values.plugin.pluginDir }}
        - name: registrar-dir
          mountPath: {{ .Values.plugin.registrarDir }}
        - name: cdi-dir
          mountPath: {{ .Values.plugin.cdiDir }}
        - name: dev-tenstorrent
          mountPath: /dev/tenstorrent
        - name: checkpoint-dir
          mountPath: {{ .Values.plugin.checkpointDir }}
        - name: tt-logs-dir
          mountPath: /tmp/tt_logs
      volumes:
      - name: plugin-dir
        hostPath:
          path: {{ .Values.plugin.pluginDir }}
          type: DirectoryOrCreate
      - name: registrar-dir
        hostPath:
          path: {{ .Values.plugin.registrarDir }}
          type: Directory
      - name: cdi-dir
        hostPath:
          path: {{ .Values.plugin.cdiDir }}
          type: DirectoryOrCreate
      - name: dev-tenstorrent
        hostPath:
          path: /dev/tenstorrent
          type: Directory
      - name: checkpoint-dir
        hostPath:
          path: {{ .Values.plugin.checkpointDir }}
          type: DirectoryOrCreate
      - name: tt-logs-dir
        hostPath:
          path: /tmp/tt_logs
          type: DirectoryOrCreate
