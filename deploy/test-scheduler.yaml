# Gang-scheduled test: 2 pods, one per node, sharing pool "t3k-pod-0".
#
# What this verifies:
#   1. Both pods schedule atomically (scheduling gate released only when both exist)
#   2. pod-0 always lands on the host-rank=0 node (t3k-node-a)
#   3. pod-1 always lands on the host-rank=1 node (t3k-node-b)
#   4. DRA allocates each node's device to the pod pinned to that node
#   5. resourceSliceCount:2 blocks allocation when a node plugin is down
#
# Approach: scheduling gates + nodeSelector (no coscheduling scheduler needed)
#
#   nodeSelector eliminates the DRA device competition that breaks coscheduling.
#   Each pod can only reach ONE node, so each pod reserves ONE specific device.
#   There is no cross-pod race — device-A is exclusively reachable by pod-0 and
#   device-B is exclusively reachable by pod-1.
#
#   The gang gate controller (in the DaemonSet plugin) removes both scheduling
#   gates simultaneously once count(gang-group) == gang-size, so both pods
#   enter the default scheduler at the same time.
#
# Expected result: t3k-scheduler-test-0 on t3k-node-a (TT_HOST_RANK=0),
#                  t3k-scheduler-test-1 on t3k-node-b (TT_HOST_RANK=1)
#
# Run:
#   kubectl apply -f deploy/test-scheduler.yaml
#   kubectl get pods -l app=t3k-scheduler-test -o wide -w
#   kubectl logs -l app=t3k-scheduler-test --prefix
#   kubectl delete -f deploy/test-scheduler.yaml
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: t3k-scheduler-test-claim
  namespace: default
spec:
  spec:
    devices:
      requests:
      - name: t3k
        exactly:
          deviceClassName: t3k.wormhole.tenstorrent.com
          selectors:
          - cel:
              expression: >
                device.attributes["tenstorrent.com"]["physical_pod"] == "t3k-pod-0"
---
# pod-0 is pinned to the host-rank=0 node (t3k-node-a).
# Its DRA claim can only allocate device-A from t3k-node-a's ResourceSlice.
apiVersion: v1
kind: Pod
metadata:
  name: t3k-scheduler-test-0
  namespace: default
  labels:
    app: t3k-scheduler-test
    tenstorrent.com/gang-group: t3k-scheduler-test
    tenstorrent.com/gang-size: "2"
spec:
  schedulingGates:
  - name: tenstorrent.com/gang-ready
  restartPolicy: Never
  nodeSelector:
    tenstorrent.com/host-rank: "0"
  resourceClaims:
  - name: t3k
    resourceClaimTemplateName: t3k-scheduler-test-claim
  containers:
  - name: test
    image: ubuntu:22.04
    command: ["/bin/bash", "-c"]
    args:
    - |
      echo "=== pod rank-0 node=$(cat /etc/hostname) ==="
      env | grep -E "^TT_|^WH_" | sort
      echo "=== OK — sleeping so both pods are visible simultaneously ==="
      sleep 30
    resources:
      claims:
      - name: t3k
---
# pod-1 is pinned to the host-rank=1 node (t3k-node-b).
# Its DRA claim can only allocate device-B from t3k-node-b's ResourceSlice.
apiVersion: v1
kind: Pod
metadata:
  name: t3k-scheduler-test-1
  namespace: default
  labels:
    app: t3k-scheduler-test
    tenstorrent.com/gang-group: t3k-scheduler-test
    tenstorrent.com/gang-size: "2"
spec:
  schedulingGates:
  - name: tenstorrent.com/gang-ready
  restartPolicy: Never
  nodeSelector:
    tenstorrent.com/host-rank: "1"
  resourceClaims:
  - name: t3k
    resourceClaimTemplateName: t3k-scheduler-test-claim
  containers:
  - name: test
    image: ubuntu:22.04
    command: ["/bin/bash", "-c"]
    args:
    - |
      echo "=== pod rank-1 node=$(cat /etc/hostname) ==="
      env | grep -E "^TT_|^WH_" | sort
      echo "=== OK — sleeping so both pods are visible simultaneously ==="
      sleep 30
    resources:
      claims:
      - name: t3k
