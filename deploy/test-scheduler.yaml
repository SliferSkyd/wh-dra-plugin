# Gang-scheduled co-scheduling test: 2 pods, one per node, sharing pool "t3k-pod-0".
#
# What this verifies:
#   1. GANG: both pods schedule atomically — neither runs until both can be placed
#   2. podAntiAffinity forces them onto different nodes
#   3. CEL selector on physical_pod pins them to the chip-to-chip pair only
#   4. Each pod gets its node's TT_HOST_RANK (0 or 1) from CDI injection
#   5. resourceSliceCount:2 blocks allocation when a node plugin is down
#
# Prerequisites:
#   scheduler-plugins must be installed (see docs/GANG-SCHEDULING.md)
#
# Expected result: EITHER both pods on t3k-node-a/b simultaneously, OR both Pending.
#
# Run:
#   kubectl apply -f deploy/test-scheduler.yaml
#   kubectl get pods -l job-name=t3k-scheduler-test -o wide -w
#   kubectl logs -l job-name=t3k-scheduler-test --prefix
#   kubectl delete -f deploy/test-scheduler.yaml
---
# PodGroup declares the gang: scheduler holds all 2 pods until both can place.
apiVersion: scheduling.sigs.k8s.io/v1alpha1
kind: PodGroup
metadata:
  name: t3k-scheduler-test-gang
  namespace: default
spec:
  minMember: 2
  scheduleTimeoutSeconds: 60
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: t3k-scheduler-test-claim
  namespace: default
spec:
  spec:
    devices:
      requests:
      - name: t3k
        exactly:
          deviceClassName: t3k.wormhole.tenstorrent.com
          selectors:
          - cel:
              expression: >
                device.attributes["tenstorrent.com"]["physical_pod"] == "t3k-pod-0"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: t3k-scheduler-test
  namespace: default
spec:
  completionMode: Indexed
  completions: 2
  parallelism: 2
  template:
    metadata:
      labels:
        job-name: t3k-scheduler-test
        # Ties this pod to the PodGroup above.
        scheduling.sigs.k8s.io/pod-group: t3k-scheduler-test-gang
    spec:
      # Route through the coscheduling-aware scheduler, not the default one.
      schedulerName: scheduler-plugins-scheduler
      restartPolicy: Never
      resourceClaims:
      - name: t3k
        resourceClaimTemplateName: t3k-scheduler-test-claim
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                job-name: t3k-scheduler-test
      containers:
      - name: test
        image: ubuntu:22.04
        command: ["/bin/bash", "-c"]
        args:
        - |
          echo "=== pod index=$JOB_COMPLETION_INDEX node=$(cat /etc/hostname) ==="
          env | grep -E "^TT_|^WH_" | sort
          echo "=== gang scheduled — both pods placed atomically ==="
          sleep 30
        resources:
          claims:
          - name: t3k
