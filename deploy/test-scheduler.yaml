# Scheduler co-scheduling test: 2 pods, one per node, sharing pool "t3k-pod-0".
#
# What this verifies:
#   1. Both pods schedule simultaneously (parallelism: 2)
#   2. podAntiAffinity forces them onto different nodes
#   3. CEL selector on physical_pod pins them to the connected pair only
#   4. Each pod gets its node's TT_HOST_RANK (0 or 1) from CDI injection
#
# Expected result: one pod on t3k-node-a (TT_HOST_RANK=0),
#                  one pod on t3k-node-b (TT_HOST_RANK=1)
#
# Run:
#   kubectl apply -f deploy/test-scheduler.yaml
#   kubectl get pods -l job-name=t3k-scheduler-test -o wide -w
#   kubectl logs -l job-name=t3k-scheduler-test --prefix
#   kubectl delete -f deploy/test-scheduler.yaml
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: t3k-scheduler-test-claim
spec:
  spec:
    devices:
      requests:
      - name: t3k
        exactly:
          deviceClassName: t3k.wormhole.tenstorrent.com
          selectors:
          - cel:
              expression: >
                device.attributes["tenstorrent.com"]["physical_pod"] == "t3k-pod-0"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: t3k-scheduler-test
spec:
  completionMode: Indexed
  completions: 2
  parallelism: 2
  template:
    metadata:
      labels:
        job-name: t3k-scheduler-test
    spec:
      restartPolicy: Never
      resourceClaims:
      - name: t3k
        resourceClaimTemplateName: t3k-scheduler-test-claim
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                job-name: t3k-scheduler-test
      containers:
      - name: test
        image: ubuntu:22.04
        command: ["/bin/bash", "-c"]
        args:
        - |
          echo "=== pod index=$JOB_COMPLETION_INDEX node=$(cat /etc/hostname) ==="
          env | grep -E "^TT_|^WH_" | sort
          echo "=== OK ==="
        resources:
          claims:
          - name: t3k
