# Gang-scheduled test: 2 pods, one per node, sharing pool "t3k-pod-0".
#
# What this verifies:
#   1. Both pods schedule with one per node (DRA exclusivity + anti-affinity)
#   2. CEL selector on physical_pod pins them to the connected pair only
#   3. Each pod gets its node's TT_HOST_RANK (0 or 1) from CDI injection
#   4. resourceSliceCount:2 blocks allocation when a node plugin is down
#   5. Gang gate ensures both pods schedule simultaneously (not one before the other)
#
# Gang scheduling via Scheduling Gates:
#   Each pod carries schedulingGates: [{name: "tenstorrent.com/gang-ready"}].
#   The gang gate controller (running inside the DaemonSet plugin on every node)
#   watches pods with the tenstorrent.com/gang-group label.  When the number of
#   active pods in a group reaches tenstorrent.com/gang-size the controller
#   removes the gate from all pods at once.  The default scheduler then sees all
#   pods in the same scheduling cycle and DRA's sequential PreBind ensures they
#   land on different nodes.
#
# Expected result: one pod on t3k-node-a (TT_HOST_RANK=0),
#                  one pod on t3k-node-b (TT_HOST_RANK=1)
#
# Run:
#   kubectl apply -f deploy/test-scheduler.yaml
#   kubectl get pods -l job-name=t3k-scheduler-test -o wide -w
#   kubectl logs -l job-name=t3k-scheduler-test --prefix
#   kubectl delete -f deploy/test-scheduler.yaml
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: t3k-scheduler-test-claim
  namespace: default
spec:
  spec:
    devices:
      requests:
      - name: t3k
        exactly:
          deviceClassName: t3k.wormhole.tenstorrent.com
          selectors:
          - cel:
              expression: >
                device.attributes["tenstorrent.com"]["physical_pod"] == "t3k-pod-0"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: t3k-scheduler-test
  namespace: default
spec:
  completionMode: Indexed
  completions: 2
  parallelism: 2
  template:
    metadata:
      labels:
        job-name: t3k-scheduler-test
        tenstorrent.com/gang-group: t3k-scheduler-test
        tenstorrent.com/gang-size: "2"
    spec:
      schedulingGates:
      - name: tenstorrent.com/gang-ready
      restartPolicy: Never
      resourceClaims:
      - name: t3k
        resourceClaimTemplateName: t3k-scheduler-test-claim
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                job-name: t3k-scheduler-test
      containers:
      - name: test
        image: ubuntu:22.04
        command: ["/bin/bash", "-c"]
        args:
        - |
          echo "=== pod index=$JOB_COMPLETION_INDEX node=$(cat /etc/hostname) ==="
          env | grep -E "^TT_|^WH_" | sort
          echo "=== OK — sleeping so both pods are visible simultaneously ==="
          sleep 30
        resources:
          claims:
          - name: t3k
