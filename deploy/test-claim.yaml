apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: wh-demo-claim
spec:
  devices:
    requests:
    - name: t3k
      exactly:
        deviceClassName: t3k.wormhole.tenstorrent.com
---
apiVersion: v1
kind: Pod
metadata:
  name: wh-demo-pod
spec:
  resourceClaims:
  - name: t3k
    resourceClaimName: wh-demo-claim
  restartPolicy: Never
  containers:
  - name: test
    image: ubuntu:22.04
    command: ["/bin/bash", "-c"]
    args:
    - |
      echo "=== /dev/tenstorrent/ devices ==="
      ls -la /dev/tenstorrent/
      echo ""
      echo "=== injected env vars ==="
      env | grep -E "^TT_|^WH_" | sort
      echo ""
      echo "=== DRA demo OK ==="
    resources:
      claims:
      - name: t3k
    securityContext:
      privileged: true
