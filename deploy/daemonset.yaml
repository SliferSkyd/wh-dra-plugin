apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wh-dra-kubelet-plugin
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: wh-dra-kubelet-plugin
  template:
    metadata:
      labels:
        app: wh-dra-kubelet-plugin
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        tenstorrent.com/arch: wormhole
      serviceAccountName: wh-dra-plugin
      containers:
      - name: wh-dra-kubelet-plugin
        image: wh-dra-kubelet-plugin:latest
        imagePullPolicy: Never
        args:
        - --node-name=$(NODE_NAME)
        - --cdi-dir=/var/run/cdi
        - --checkpoint-dir=/var/lib/wh-dra/checkpoint
        - --metrics-port=9090
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
        volumeMounts:
        - name: plugin-dir
          mountPath: /var/lib/kubelet/plugins/wormhole.tenstorrent.com
        - name: registrar-dir
          mountPath: /var/lib/kubelet/plugins_registry
        - name: cdi-dir
          mountPath: /var/run/cdi
        - name: dev-tenstorrent
          mountPath: /dev/tenstorrent
        - name: checkpoint-dir
          mountPath: /var/lib/wh-dra/checkpoint
      volumes:
      - name: plugin-dir
        hostPath:
          path: /var/lib/kubelet/plugins/wormhole.tenstorrent.com
          type: DirectoryOrCreate
      - name: registrar-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry
          type: Directory
      - name: cdi-dir
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      - name: dev-tenstorrent
        hostPath:
          path: /dev/tenstorrent
          type: Directory
      - name: checkpoint-dir
        hostPath:
          path: /var/lib/wh-dra/checkpoint
          type: DirectoryOrCreate
