apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wh-dra-kubelet-plugin
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: wh-dra-kubelet-plugin
  template:
    metadata:
      labels:
        app: wh-dra-kubelet-plugin
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        tenstorrent.com/arch: wormhole
      serviceAccountName: wh-dra-plugin
      imagePullSecrets:
      - name: ghcr-credentials
      containers:
      - name: wh-dra-kubelet-plugin
        image: ghcr.io/slifersky/wh-dra-plugin:latest
        imagePullPolicy: Always
        command: ["/usr/local/bin/wh-dra-kubelet-plugin"]
        args:
        - --node-name=$(NODE_NAME)
        - --cdi-dir=/var/run/cdi
        - --checkpoint-dir=/var/lib/wh-dra/checkpoint
        - --metrics-port=9090
        - --tt-smi-path=/usr/local/bin/tt-smi
        - --health-check-interval=30s
        - --fm-addr=ttfm-agent.ttfm.svc.cluster.local:50053
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
        volumeMounts:
        - name: plugin-dir
          mountPath: /var/lib/kubelet/plugins/wormhole.tenstorrent.com
        - name: registrar-dir
          mountPath: /var/lib/kubelet/plugins_registry
        - name: cdi-dir
          mountPath: /var/run/cdi
        - name: dev-tenstorrent
          mountPath: /dev/tenstorrent
        - name: checkpoint-dir
          mountPath: /var/lib/wh-dra/checkpoint
        - name: tt-logs-dir
          mountPath: /tmp/tt_logs
      volumes:
      - name: plugin-dir
        hostPath:
          path: /var/lib/kubelet/plugins/wormhole.tenstorrent.com
          type: DirectoryOrCreate
      - name: registrar-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry
          type: Directory
      - name: cdi-dir
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      - name: dev-tenstorrent
        hostPath:
          path: /dev/tenstorrent
          type: Directory
      - name: checkpoint-dir
        hostPath:
          path: /var/lib/wh-dra/checkpoint
          type: DirectoryOrCreate
      - name: tt-logs-dir
        hostPath:
          path: /tmp/tt_logs
          type: DirectoryOrCreate
